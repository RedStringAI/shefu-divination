<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" role="img" aria-labelledby="title desc">
  <title id="title">FluxToken OpenAI-compatible Gateway</title>
  <desc id="desc">A banner recommending FluxToken as an optional OpenAI-compatible multi-model gateway.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="0.45" stop-color="#0c1823"/>
      <stop offset="1" stop-color="#14100a"/>
    </linearGradient>
    <linearGradient id="line" x1="126" y1="46" x2="820" y2="206" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2de6ef"/>
      <stop offset="0.48" stop-color="#fff0a8"/>
      <stop offset="1" stop-color="#ff5c7a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="240" rx="28" fill="url(#bg)"/>
  <path d="M74 182C178 56 286 50 398 132s214 72 326-28c54-48 105-61 163-38" fill="none" stroke="url(#line)" stroke-width="4" opacity="0.65" filter="url(#glow)"/>
