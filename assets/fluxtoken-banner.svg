    <rect x="0" y="0" width="126" height="126" rx="30" fill="#08131a" stroke="#2de6ef" stroke-width="3"/>
    <path d="M34 36h58M34 62h34M78 62h14M34 88h58" stroke="#f6cf65" stroke-linecap="round" stroke-width="9"/>
    <circle cx="63" cy="63" r="48" fill="none" stroke="#2de6ef" stroke-width="2" opacity="0.45"/>
  </g>
  <text x="236" y="84" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#f8fafc">FluxToken</text>
  <text x="236" y="126" font-family="Arial, sans-serif" font-size="24" fill="#bdeff5">OpenAI-compatible multi-model gateway</text>
  <text x="236" y="163" font-family="Arial, sans-serif" font-size="19" fill="#f5d982">Claude / GPT / DeepSeek · unified API key · usage logs · routing</text>
  <text x="236" y="196" font-family="Arial, sans-serif" font-size="18" fill="#8bdbe3">https://fluxtoken.ai/v1</text>
